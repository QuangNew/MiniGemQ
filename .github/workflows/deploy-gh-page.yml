name: Deploy MiniGemQ Page -> GitHub Pages
run-name: MiniGemQ page deploy - ${{ github.ref_name }} - ${{ github.event_name }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-gh-page.yml'
      - 'index.html'
      - 'package-lock.json'
      - 'package.json'
      - 'public/**'
      - 'src/**'
      - 'vite.config.js'

permissions:
  contents: write

concurrency:
  group: deploy-minigemq-page-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy_minigemq_page:
    name: Deploy MiniGemQ website
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build MiniGemQ website
        run: npm run build

      - name: Prepare GitHub Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/index.html

          rm -rf pages-artifact
          mkdir -p pages-artifact
          cp -R dist/. pages-artifact/
          touch pages-artifact/.nojekyll

      - name: Publish website to gh-pages
        shell: bash
        run: |
          set -euo pipefail

          workspace="$(pwd)"
          publish_dir="$workspace/.gh-pages-worktree"
          rm -rf "$publish_dir"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages --depth 1
            git worktree add -B gh-pages "$publish_dir" origin/gh-pages
          else
            git worktree add --detach "$publish_dir"
            cd "$publish_dir"
            git switch --orphan gh-pages
            git rm -rf . || true
            cd "$workspace"
          fi

          find "$publish_dir" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R pages-artifact/. "$publish_dir/"

          cd "$publish_dir"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all

          if git diff --cached --quiet; then
            echo "MiniGemQ website is already current."
          else
            commit_sha="${{ github.sha }}"
            git commit -m "Deploy MiniGemQ website: ${commit_sha:0:8}"
            git push origin HEAD:gh-pages
          fi
